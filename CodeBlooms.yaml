openapi: 3.0.3
info:
  title: CodeBlooms E-Ticaret REST API
  description: |
    CodeBlooms hediye ve çiçek platformu için geliştirilmiş RESTful API dokümantasyonu.
    
  version: 1.0.0
  contact:
    name: CodeBlooms Ekibi (Sedef Gizem & Eda)
    email: destek@codeblooms.com

servers:
  - url: https://api.codeblooms.com
    description: Üretim (Production) Sunucusu
  - url: http://localhost:3000
    description: Yerel Geliştirme (Local) Sunucusu

tags:
  - name: Kullanıcılar
    description: Kullanıcı kayıt işlemleri
  - name: Ürünler
    description: Çiçek ve hediye ürünleri işlemleri
  - name: Sepet
    description: Alışveriş sepeti işlemleri
  - name: Siparişler
    description: Sipariş oluşturma, listeleme ve güncelleme
  - name: Yorumlar
    description: Ürün değerlendirme işlemleri
  - name: Notlar
    description: Hediye notu işlemleri

security:
  - BearerAuth: []

paths:
  # ==========================================
  # GİZEM'İN GEREKSİNİMLERİ
  # ==========================================
  /api/users/register:
    post:
      tags: 
        - Kullanıcılar
      summary: Kullanıcı Kaydı
      description: Yeni müşterilerin alışveriş yapabilmek için sisteme kayıt olmasını sağlar.
      operationId: registerUser
      security: [] 
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Kullanıcı başarıyla oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/products:
    get:
      tags: 
        - Ürünler
      summary: Ürünleri Listeleme
      description: Sistemdeki tüm ürünlerin veya belirli bir kategorideki hediyelerin listelenmesi.
      operationId: listProducts
      security: []
      responses:
        "200":
          description: Ürünler başarıyla listelendi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      tags: 
        - Ürünler
      summary: Ürün Ekleme
      description: Sisteme satılmak üzere yeni bir hediye veya çiçek seçeneği ekler.
      operationId: addProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Ürün başarıyla eklendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/products/{productId}:
    delete:
      tags: 
        - Ürünler
      summary: Ürün Silme
      description: Sistemde kayıtlı olan ve artık satışı yapılmayacak bir ürünü kaldırır.
      operationId: deleteProduct
      parameters:
        - $ref: "#/components/parameters/ProductIdParam"
      responses:
        "204":
          description: Ürün başarıyla silindi
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/orders/{orderId}:
    put:
      tags: 
        - Siparişler
      summary: Sipariş Güncelleme
      description: Müşterinin aktif bir siparişine ait teslimat adresini günceller.
      operationId: updateOrder
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deliveryAddress:
                  type: string
                  minLength: 10
                  example: "Atatürk Mah. Çiçek Sok. No:5 Isparta"
      responses:
        "200":
          description: Sipariş adresi güncellendi
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/orders/{userId}:
    get:
      tags: 
        - Siparişler
      summary: Sipariş Listeleme
      description: Müşterinin geçmiş ve aktif siparişlerinin durumunu getirir.
      operationId: listUserOrders
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: Siparişler başarıyla getirildi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/products/{productId}/comments:
    post:
      tags: 
        - Yorumlar
      summary: Ürün Yorum Ekleme
      description: Kullanıcının teslim aldığı ürüne puan (1-5) vermesini ve yorum yazmasını sağlar.
      operationId: addProductComment
      parameters:
        - $ref: "#/components/parameters/ProductIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Yorum başarıyla eklendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/comments/{commentId}:
    delete:
      tags: 
        - Yorumlar
      summary: Ürün Yorum Silme
      description: Kullanıcının daha önce yaptığı yorumu sistemden kaldırır.
      operationId: deleteComment
      parameters:
        - $ref: "#/components/parameters/CommentIdParam"
      responses:
        "204":
          description: Yorum başarıyla silindi
        "404":
          $ref: "#/components/responses/NotFound"

  # ==========================================
  # EDA'NIN GEREKSİNİMLERİ
  # ==========================================
  /api/cart/add:
    post:
      tags: 
        - Sepet
      summary: Sepete Ürün Ekleme
      description: Kullanıcının seçtiği ürünü alışveriş sepetine atmasını sağlar.
      operationId: addToCart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "201":
          description: Ürün sepete eklendi
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/cart/items/{itemId}:
    put:
      tags: 
        - Sepet
      summary: Sepet Güncelleme
      description: Sepetteki mevcut ürünün adetini değiştirir.
      operationId: updateCartItem
      parameters:
        - $ref: "#/components/parameters/ItemIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
                  minimum: 1
                  example: 3
      responses:
        "200":
          description: Sepet başarıyla güncellendi
    delete:
      tags: 
        - Sepet
      summary: Sepetten Ürün Silme
      description: Kullanıcının almaktan vazgeçtiği ürünü sepetten tamamen çıkarır.
      operationId: removeFromCart
      parameters:
        - $ref: "#/components/parameters/ItemIdParam"
      responses:
        "204":
          description: Ürün sepetten silindi

  /api/cart:
    get:
      tags: 
        - Sepet
      summary: Sepet Listeleme
      description: Kullanıcının sepetindeki ürünleri ve toplam tutarı gösterir.
      operationId: listCart
      responses:
        "200":
          description: Sepet başarıyla getirildi
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/orders:
    post:
      tags: 
        - Siparişler
      summary: Sipariş Oluşturma
      description: Sepetteki ürünler için adres ve ödeme bilgilerini onaylayarak siparişi tamamlar.
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateInput"
      responses:
        "201":
          description: Sipariş sisteme kaydedildi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/orders/{orderId}/cancel:
    delete:
      tags: 
        - Siparişler
      summary: Sipariş İptali
      description: Henüz kargoya verilmemiş siparişi iptal eder.
      operationId: cancelOrder
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      responses:
        "204":
          description: Sipariş başarıyla iptal edildi
        "404":
          $ref: "#/components/responses/NotFound"

  /api/orders/{orderId}/notes:
    post:
      tags: 
        - Notlar
      summary: Hediye Notu Ekleme
      description: Siparişe hediye edilecek kişi için özel bir mesaj kartı ekler.
      operationId: addOrderNote
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Hediye notu eklendi
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/orders/{orderId}/notes/{noteId}:
    delete:
      tags: 
        - Notlar
      summary: Hediye Notu Silme
      description: Eklenen notta hata yapıldıysa mesajı sistemden kaldırır.
      operationId: deleteOrderNote
      parameters:
        - $ref: "#/components/parameters/OrderIdParam"
        - $ref: "#/components/parameters/NoteIdParam"
      responses:
        "204":
          description: Hediye notu başarıyla silindi
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Kimlik doğrulama için JWT token gereklidir. "Authorization: Bearer <token>"'

  parameters:
    ProductIdParam:
      name: productId
      in: path
      required: true
      schema:
        type: string
        example: "prod_555"
      description: Ürünün ID'si
    OrderIdParam:
      name: orderId
      in: path
      required: true
      schema:
        type: string
        example: "ord_777"
      description: Siparişin ID'si
    UserIdParam:
      name: userId
      in: path
      required: true
      schema:
        type: string
        example: "usr_999"
      description: Kullanıcının ID'si
    ItemIdParam:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        example: "itm_111"
      description: Sepet kaleminin ID'si
    CommentIdParam:
      name: commentId
      in: path
      required: true
      schema:
        type: string
        example: "cmt_222"
      description: Yorumun ID'si
    NoteIdParam:
      name: noteId
      in: path
      required: true
      schema:
        type: string
        example: "not_333"
      description: Notun ID'si

  responses:
    BadRequest:
      description: Eksik veya hatalı parametre
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Kimlik doğrulama başarısız
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: İstenen kaynak bulunamadı
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: "VALIDATION_ERROR"
        message:
          type: string
          example: "Geçersiz istek verisi"

    UserInput:
      type: object
      required: [email, sifre, ad, soyad]
      properties:
        email:
          type: string
          format: email
          example: "gizem@codeblooms.com"
        sifre:
          type: string
          minLength: 8
          maxLength: 32
          example: "Gizli123!"
        ad:
          type: string
          minLength: 2
          example: "Sedef Gizem"
        soyad:
          type: string
          minLength: 2
          example: "Orulluoğlu"

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        email:
          type: string
          format: email
        ad:
          type: string
        kayitTarihi:
          type: string
          format: date-time
          example: "2026-03-05T10:00:00Z"

    ProductInput:
      type: object
      required: [name, price, stock]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
          example: "Papatya Aranjmanı"
        price:
          type: number
          format: float
          minimum: 0.1
          example: 450.00
        stock:
          type: integer
          minimum: 0
          example: 50
        imageUrl:
          type: string
          nullable: true
          example: "https://site.com/image.jpg"

    Product:
      type: object
      properties:
        id:
          type: string
          example: "prod_123"
        name:
          type: string
          example: "Kırmızı Gül Buketi"
        price:
          type: number
          format: float
        imageUrl:
          type: string
          nullable: true
        olusturulmaTarihi:
          type: string
          format: date-time
          example: "2026-03-05T10:00:00Z"

    CommentInput:
      type: object
      required: [rating, text]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        text:
          type: string
          minLength: 5
          maxLength: 500
          example: "Çiçekler harikaydı, çok beğendim!"

    Comment:
      type: object
      properties:
        id:
          type: string
        rating:
          type: integer
        text:
          type: string
        tarih:
          type: string
          format: date-time
          example: "2026-03-05T12:00:00Z"

    CartItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
          example: "prod_123"
        quantity:
          type: integer
          minimum: 1
          example: 1

    OrderCreateInput:
      type: object
      required: [deliveryAddress, paymentMethod]
      properties:
        deliveryAddress:
          type: string
          minLength: 10
          maxLength: 250
          example: "SDÜ Mühendislik Fakültesi, Isparta"
        paymentMethod:
          type: string
          example: "Kredi Kartı"

    Order:
      type: object
      properties:
        id:
          type: string
        deliveryAddress:
          type: string
        status:
          type: string
          example: "Hazırlanıyor"
        siparisTarihi:
          type: string
          format: date-time
          example: "2026-03-05T14:30:00Z"

    NoteInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 2
          maxLength: 250
          nullable: true
          example: "Nice mutlu yaşlara!"